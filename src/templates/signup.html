{% extends 'layout.html' %}
{% block content %}
<div class="auth-wrapper">
  <div class="auth-card">

        <h2>Create an Account</h2>
        <p class="subtitle">Join PetCareA — your pet deserves the best.</p>

        {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
        {% endif %}

        <form method="POST" action="/signup.html">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <div class="mb-3">
                <label for="username" class="form-label">Username</label>
                <input type="text" class="form-control" id="username" name="username" placeholder="Choose a username" required>
            </div>

            <div class="mb-3">
                <label for="email" class="form-label">Email Address</label>
                <input type="email" class="form-control" id="email" name="email" placeholder="name@example.com" required>
            </div>

            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input type="password" class="form-control" id="password" name="password" placeholder="At least 8 characters" required minlength="8">
            </div>

            <div class="mb-4">
                <label for="confirm_password" class="form-label">Confirm Password</label>
                <input type="password" class="form-control" id="confirm_password" name="confirm_password" placeholder="Repeat your password" required>
            </div>

            <button type="submit" class="btn btn-success w-100">Sign Up</button>
        </form>

        <p class="mt-3 text-center" style="font-size:0.92rem; color: var(--text-light);">
            Already have an account? <a href="/login.html">Log In</a>
        </p>


  </div>
</div>
{% endblock %}
